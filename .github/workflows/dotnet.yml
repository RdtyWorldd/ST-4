name: .NET CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore
        run: dotnet restore ST-4.sln

      - name: Build
        run: dotnet build ST-4.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BugTests/BugTests.csproj --configuration Release --no-build --verbosity normal
